<!DOCTYPE html>
<html lang="eu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f766e" />
  <title>OPEIKASI · Blokea</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="block">
  <div class="app-shell">
    <header class="sub-hero">
      <a href="index.html" class="back-link">← Hasierara</a>
      <div>
        <p class="eyebrow">Lan-atala</p>
        <h1 id="blockTitle">Blokea</h1>
        <p id="blockSubtitle" class="hero-text"></p>
      </div>
    </header>

    <main class="main-content block-layout">
      <section class="panel block-intro">
        <h2 id="blockMainTitle"></h2>
        <div class="goal-box">
          <h3>Helburuak</h3>
          <ul id="helburuakList"></ul>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Edukiak</h2>
          <p>Atal bakoitza ireki, kopiatu edo deskargatu dezakezu.</p>
        </div>

        <div class="accordion-group" id="blockAccordion"></div>
      </section>

      <section class="panel checklist-panel">
        <div class="section-head">
          <div>
            <h2>Checklist</h2>
            <p>Markatu eginda dituzun pausoak. Gordeta geldituko dira gailuan.</p>
          </div>
          <button class="ghost-btn" id="resetChecklistBtn">Berrezarri</button>
        </div>
        <div id="checklistContainer" class="checklist-list"></div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
